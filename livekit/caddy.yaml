logging:
  logs:
    default:
      level: INFO

apps:
  tls:
    certificates:
      automate:
        - lk.workflow-tech.info
  http:
    servers:
      srv0:
        listen:
          - ":443"
        routes:
          - match:
              - host:
                  - lk.workflow-tech.info
            handle:
              - handler: reverse_proxy
                upstreams:
                  - dial: localhost:7880
            terminal: true
