version: "3.9"

services:
  swaram:
    build: .
    restart: unless-stopped
    shm_size: '512m'
    ports:
      - "8000:8000"   # Python backend (FastAPI)
      - "127.0.0.1:3000:3000" # Next.js frontend (local only)
    env_file:
      - .env
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
    volumes:
      - swaram_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/stats"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  swaram_data:
