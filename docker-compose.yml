version: "3.9"

services:
  swaram:
    build: .
    restart: unless-stopped
    shm_size: '512m'
    ports:
      - "8000:8000"   # Python backend (FastAPI)
      - "80:3000"     # Next.js frontend (AWS HTTP Port 80)
    env_file:
      - .env
    volumes:
      - swaram_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/stats"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  swaram_data:
